<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Diagnostic Test: Forms 1-3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .split-container { display: grid; grid-template-columns: 1fr 1.2fr; gap: 20px; height: 500px; }
        .scroll-panel { overflow-y: auto; padding: 20px; background: white; border-radius: 12px; border: 1px solid #e2e8f0; }
        .question-card { transition: all 0.2s; border-left: 4px solid transparent; }
        .question-card:hover { border-left: 4px solid #3b82f6; background-color: #f1f5f9; }
        .word-pill { display: inline-block; padding: 4px 12px; background-color: #e0f2fe; color: #0369a1; border-radius: 9999px; font-weight: 500; margin-right: 8px; margin-bottom: 8px; }
        .error-text-box { font-family: 'Times New Roman', Times, serif; font-size: 1.1rem; line-height: 2; }
        .hidden { display: none; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="test-container" class="max-w-6xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-200">
        <div class="bg-blue-600 p-6 text-white text-center">
            <h1 class="text-2xl font-bold uppercase tracking-tight">English Diagnostic Test</h1>
        </div>

        <div id="student-info" class="p-8 space-y-4">
            <h2 class="text-xl font-semibold text-slate-800 border-b pb-2">Student Information</h2>
            <input type="text" id="student-name" class="w-full border p-2 rounded" placeholder="Enter your name">
            <select id="student-form" class="w-full border p-2 rounded"><option value="form1">Form 1</option><option value="form2">Form 2</option><option value="form3">Form 3</option></select>
            <button onclick="startTest()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg">START TEST</button>
        </div>

        <div id="main-test" class="hidden flex flex-col h-[85vh]">
            <div class="flex-grow overflow-y-auto p-6 bg-slate-50 space-y-12">
                <div id="grammar-questions" class="space-y-4"></div>
                <div id="vocab-questions" class="space-y-4"></div>
                <div id="error-text" class="error-text-box"></div>
                <div id="error-inputs" class="grid grid-cols-4 gap-2"></div>
                <div id="reading-text-container"></div>
                <div id="reading-questions"></div>
                <div id="writing-content-container"></div>
            </div>
            <button id="submit-btn" onclick="finishTest()" class="bg-green-600 text-white font-bold py-4 w-full">FINISH & SUBMIT</button>
        </div>

        <div id="results" class="hidden p-8 text-center">
            <h2 class="text-3xl font-bold">Test Completed!</h2>
            <div id="teacher-analysis" class="bg-slate-100 p-6 rounded-xl mt-4"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA8K3xEEnIpQ7oYJ6erwNXKqn--OzVSagE",
            authDomain: "english-diagnostic-tests.firebaseapp.com",
            projectId: "english-diagnostic-tests",
            storageBucket: "english-diagnostic-tests.firebasestorage.app",
            messagingSenderId: "111042641475",
            appId: "1:111042641475:web:d01857f4d7ae8cd2939ef6"
        };

        const db = getDatabase(initializeApp(firebaseConfig));
        
        // Load data and logic here (Original testData and functions remain unchanged)
        window.finishTest = async function() {
            if(!confirm("Submit test?")) return;
            // ... [Assume previous score logic is here]
            try {
                await push(ref(db, 'submissions/'), {
                    studentName: document.getElementById('student-name').value,
                    timestamp: new Date().toISOString()
                });
                alert("Data saved to Firebase!");
            } catch (err) { alert("Error: " + err.message); }
            document.getElementById('results').classList.remove('hidden');
        };
    </script>
</body>
</html>
